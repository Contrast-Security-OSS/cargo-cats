apiVersion: agents.contrastsecurity.com/v1beta1
kind: AgentInjector
metadata:
  name: contrast-java-injector
spec:
  enabled: true
  type: java
  selector:
    labels:
      - name: contrast-agent
        value: java
---
apiVersion: agents.contrastsecurity.com/v1beta1
kind: AgentInjector
metadata:
  name: contrast-python-injector
spec:
  enabled: true
  type: python
  selector:
    labels:
      - name: contrast-agent
        value: python
---
apiVersion: agents.contrastsecurity.com/v1beta1
kind: AgentInjector
metadata:
  name: contrast-nodejs-injector
spec:
  enabled: true
  type: nodejs
  selector:
    labels:
      - name: contrast-agent
        value: nodejs
---
apiVersion: agents.contrastsecurity.com/v1beta1
kind: AgentInjector
metadata:
  name: contrast-dotnet-core-injector
spec:
  enabled: true
  type: dotnet-core
  selector:
    labels:
      - name: contrast-agent
        value: dotnet-core
---
apiVersion: agents.contrastsecurity.com/v1beta1
kind: AgentInjector
metadata:
  name: contrast-flex-injector
spec:
  enabled: true
  type: flex
  selector:
    images:
      - "*"
    labels:
      - name: contrast-agent
        value: flex
